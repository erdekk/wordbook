<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>단어장</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0e0e10;
  --surface: #1a1a1f;
  --card: #1f1f26;
  --border: #2e2e38;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #f0f0f5;
  --dim: #8888aa;
  --muted: #55556a;
  --r: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

.screen { display:none; flex-direction:column; height:100%; overflow:hidden; }
.screen.active { display:flex; }

.scroll-body {
  flex: 1; overflow-y: auto; padding: 0 16px 32px;
  -webkit-overflow-scrolling: touch;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 12px;
  padding-top: max(16px, env(safe-area-inset-top));
  flex-shrink: 0;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-sub { font-size: 11px; color: var(--dim); margin-top: 1px; font-family: 'Space Mono', monospace; }

.btn-icon {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 14px;
  font-size: 12px; color: var(--dim); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
}

.btn {
  width: 100%; padding: 15px 20px; border-radius: 13px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: transform .1s, opacity .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: #1e1010; color: var(--red); border: 1px solid #3a1a1a; }

.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--r);
  padding: 20px 16px; text-align: center; cursor: pointer;
  background: var(--surface); transition: border-color .2s, background .2s;
  margin-bottom: 16px;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1a1a2e; }
.upload-icon { font-size: 26px; margin-bottom: 6px; }
.upload-text { font-size: 13px; color: var(--dim); line-height: 1.6; }
.upload-text strong { color: var(--text); }
#fileInput { display: none; }

.section-label {
  font-size: 11px; color: var(--muted); letter-spacing: 2px;
  text-transform: uppercase; font-family: 'Space Mono', monospace;
  margin: 20px 0 10px;
}

.set-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 12px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.set-card.active-set { border-color: var(--accent); }
.set-card.active-set::before {
  content: '학습 중';
  position: absolute; top: 0; right: 0;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 0 var(--r) 0 10px;
  letter-spacing: 1px;
}

.set-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; padding-right: 60px; word-break: break-all; }
.set-meta { font-size: 11px; color: var(--dim); font-family: 'Space Mono', monospace; margin-bottom: 10px; }
.set-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.set-stat { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; }
.set-stat.total   { background: #22223a; color: var(--dim); }
.set-stat.known   { background: #0d2a1a; color: var(--green); }
.set-stat.unknown { background: #2a0d0d; color: var(--red); }
.set-stat.neww    { background: #1a1a2e; color: var(--accent); }
.set-progress { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
.set-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 999px; }
.set-actions { display: flex; gap: 8px; margin-top: 12px; }
.set-actions .btn { flex:1; padding: 10px; font-size: 13px; border-radius: 10px; }
.set-sub-actions { display: flex; gap: 8px; margin-top: 8px; }
.set-sub-actions .btn { flex:1; padding: 8px; font-size: 12px; border-radius: 10px; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--dim); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.8; }

/* WORD LIST */
.filter-tabs {
  display: flex; gap: 6px; padding: 8px 16px;
  flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.filter-tab {
  padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--dim); font-size: 12px; cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans KR', sans-serif; transition: background .15s, color .15s;
}
.filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.word-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.word-row:last-child { border-bottom: none; }
.word-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 24px; padding-top: 2px; }
.word-info { flex: 1; min-width: 0; }
.word-main { font-size: 15px; font-weight: 700; }
.word-pron { font-size: 11px; color: var(--accent); font-style: italic; margin-top: 1px; }
.word-meaning { font-size: 12px; color: var(--dim); margin-top: 3px; }
.word-example { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; line-height: 1.5; }
.word-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
.badge-known   { background: #0d2a1a; color: var(--green); }
.badge-unknown { background: #2a0d0d; color: var(--red); }
.badge-new     { background: #1a1a2e; color: var(--accent); }

/* STUDY */
#study { position: relative; overflow: hidden; }
.study-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top)); flex-shrink: 0;
}
.study-counter { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--dim); text-align: center; }
.study-counter span { color: var(--text); font-weight: 700; }
.study-prog-bar { height: 3px; background: var(--border); margin: 0 16px; flex-shrink: 0; }
.study-prog-fill { height: 100%; background: var(--accent); transition: width .4s ease; }

.mode-pills { display: flex; gap: 6px; padding: 10px 16px 0; flex-shrink: 0; }
.mode-pill {
  flex: 1; padding: 9px 4px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface); color: var(--dim);
  font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: background .15s, color .15s; text-align: center;
}
.mode-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.card-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; position: relative; overflow: hidden;
}
.swipe-hint {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 10;
}
.hint-left  { left: 12px; color: var(--red); }
.hint-right { right: 12px; color: var(--green); }

.card-wrap { width: 100%; max-width: 380px; perspective: 1200px; user-select: none; }
.flashcard {
  width: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.23,1,.32,1);
  cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard.fly-right { transition: transform .35s ease, opacity .35s ease; transform: translateX(130%) rotate(15deg); opacity: 0; }
.flashcard.fly-left  { transition: transform .35s ease, opacity .35s ease; transform: translateX(-130%) rotate(-15deg); opacity: 0; }

.card-face {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 32px 24px; min-height: 310px;
  display: flex; flex-direction: column; justify-content: center; gap: 16px;
  position: relative; overflow: hidden;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.card-face::before {
  content: ''; position: absolute; top: -50px; right: -50px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(108,99,255,.12), transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.card-back {
  position: absolute; top:0; left:0; right:0;
  transform: rotateY(180deg);
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.card-back::before { background: radial-gradient(circle, rgba(255,101,132,.12), transparent 70%); }
.card-tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; }
.card-word { font-family: 'Space Mono', monospace; font-size: clamp(26px, 7.5vw, 40px); font-weight: 700; line-height: 1.1; word-break: break-word; }
.card-pron { font-size: 13px; color: var(--accent); font-style: italic; }
.card-hint { font-size: 11px; color: var(--muted); margin-top: auto; }
.card-meaning { font-size: clamp(20px, 5.5vw, 28px); font-weight: 700; line-height: 1.3; }
.card-example { font-size: 13px; color: var(--dim); line-height: 1.7; border-left: 2px solid var(--accent2); padding-left: 12px; }
.card-example em { color: var(--accent2); font-style: normal; font-weight: 600; }
.card-overlay {
  position: absolute; inset: 0; border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; opacity: 0; pointer-events: none; z-index: 5;
}
.overlay-right { background: rgba(74,222,128,.15); }
.overlay-left  { background: rgba(248,113,113,.15); }

.action-bar {
  padding: 12px 32px; padding-bottom: max(24px, env(safe-area-inset-bottom));
  display: flex; justify-content: center; gap: 28px; align-items: center; flex-shrink: 0;
}
.act-wrap { display: flex; flex-direction: column; align-items: center; }
.act-btn {
  border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s; box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.act-btn:active { transform: scale(0.88); }
.act-no   { width:62px; height:62px; font-size:24px; background:#2a1010; border:2px solid var(--red); color:var(--red); }
.act-yes  { width:70px; height:70px; font-size:28px; background:#0a2a15; border:2px solid var(--green); color:var(--green); }
.act-skip { width:46px; height:46px; font-size:16px; background:var(--surface); border:1px solid var(--border); color:var(--muted); }
.act-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 5px; letter-spacing: 1px; }

/* RESULT */
#result { align-items:center; justify-content:center; padding: 32px 24px; gap:20px; }
.result-emoji { font-size: 56px; }
.result-title { font-size: 26px; font-weight: 700; text-align: center; }
.result-stats { display: flex; gap: 14px; }
.result-stat { text-align:center; padding:14px 22px; background:var(--surface); border:1px solid var(--border); border-radius:14px; }
.result-stat-num { font-family:'Space Mono',monospace; font-size:30px; font-weight:700; }
.result-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:360px; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border-radius:22px 22px 0 0; border:1px solid var(--border); border-bottom:none; padding:22px; padding-bottom:max(30px,env(safe-area-inset-bottom)); width:100%; max-width:480px; }
.modal-title { font-size:17px; font-weight:700; margin-bottom:12px; }
.modal-body { font-size:13px; color:var(--dim); line-height:1.7; margin-bottom:18px; }
.modal-btns { display:flex; flex-direction:column; gap:9px; }

.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(16px);
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:10px 20px; border-radius:99px; font-size:13px;
  opacity:0; transition:opacity .3s, transform .3s;
  pointer-events:none; z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="topbar">
    <div><div class="topbar-title">📖 내 단어장</div></div>
  </div>
  <div class="scroll-body">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📂</div>
      <div class="upload-text">
        <strong>엑셀 파일 불러오기</strong><br>
        A: 단어 &nbsp;|&nbsp; B: 뜻 &nbsp;|&nbsp; C: 예시 문장 &nbsp;|&nbsp; D: 발음<br>
        <span style="font-size:11px;color:var(--muted)">1행 헤더 자동 건너뜀 · 불러올 때마다 날짜와 함께 기록됨</span>
      </div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    <div class="section-label">불러온 파일 기록</div>
    <div id="setList"></div>
  </div>
</div>

<!-- WORD LIST -->
<div id="wordlist" class="screen">
  <div class="topbar">
    <button class="btn-icon" id="wlBack">← 홈</button>
    <div style="text-align:center">
      <div class="topbar-title" id="wlTitle"></div>
      <div class="topbar-sub" id="wlDate"></div>
    </div>
    <div style="width:60px"></div>
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">전체</button>
    <button class="filter-tab" data-filter="known">✓ 안 것</button>
    <button class="filter-tab" data-filter="unknown">✗ 모른 것</button>
    <button class="filter-tab" data-filter="new">미학습</button>
  </div>
  <div class="scroll-body" id="wordListBody"></div>
</div>

<!-- STUDY -->
<div id="study" class="screen">
  <div class="study-header">
    <button class="btn-icon" id="studyBack">← 나가기</button>
    <div class="study-counter">
      <div><span id="cardCur">1</span> / <span id="cardTot">0</span></div>
      <div id="studySetName" style="font-size:10px;margin-top:2px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
    </div>
    <button class="btn-icon" id="btnFlip">뒤집기</button>
  </div>
  <div class="study-prog-bar"><div class="study-prog-fill" id="studyProg" style="width:0%"></div></div>
  <div class="mode-pills">
    <button class="mode-pill active" data-mode="all">전체</button>
    <button class="mode-pill" data-mode="unknown">모르는 것만</button>
    <button class="mode-pill" data-mode="known">아는 것만</button>
  </div>
  <div class="card-area">
    <div class="swipe-hint hint-left">✗ 몰라</div>
    <div class="swipe-hint hint-right">✓ 알아</div>
    <div class="card-wrap">
      <div class="flashcard" id="flashcard">
        <div class="card-face" id="cFront">
          <div class="card-tag">단어</div>
          <div class="card-word" id="cWord"></div>
          <div class="card-pron" id="cPron"></div>
          <div class="card-hint">👆 탭하면 뜻 보기</div>
          <div class="card-overlay overlay-right" id="or1">✓</div>
          <div class="card-overlay overlay-left"  id="ol1">✗</div>
        </div>
        <div class="card-face card-back" id="cBack">
          <div class="card-tag">뜻</div>
          <div class="card-meaning" id="cMeaning"></div>
          <div class="card-example" id="cExample"></div>
          <div class="card-overlay overlay-right" id="or2">✓</div>
          <div class="card-overlay overlay-left"  id="ol2">✗</div>
        </div>
      </div>
    </div>
  </div>
  <div class="action-bar">
    <div class="act-wrap">
      <button class="act-btn act-no" id="btnNo">✗</button>
      <span class="act-label">몰라요</span>
    </div>
    <div class="act-wrap">
      <button class="act-btn act-skip" id="btnSkip">→</button>
      <span class="act-label">건너뜀</span>
    </div>
    <div class="act-wrap">
      <button class="act-btn act-yes" id="btnYes">✓</button>
      <span class="act-label">알아요</span>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-emoji" id="resEmoji">🎉</div>
  <div class="result-title" id="resTitle">학습 완료!</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-num" style="color:var(--green)" id="resKnown">0</div>
      <div style="font-size:11px;color:var(--dim);margin-top:3px">알아요 ✓</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" style="color:var(--red)" id="resUnknown">0</div>
      <div style="font-size:11px;color:var(--dim);margin-top:3px">몰라요 ✗</div>
    </div>
  </div>
  <div class="result-btns">
    <button class="btn btn-primary" id="resAgain">다시 학습하기</button>
    <button class="btn btn-secondary" id="resHome">홈으로</button>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="delModal">
  <div class="modal">
    <div class="modal-title">이 파일 기록을 삭제할까요?</div>
    <div class="modal-body">단어 목록과 학습 기록이 모두 삭제돼요. 되돌릴 수 없어요.</div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="delConfirm">삭제</button>
      <button class="btn btn-secondary" id="delCancel">취소</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <div class="modal-title">학습 기록만 초기화할까요?</div>
    <div class="modal-body">단어는 유지되고 아는/모르는 표시만 초기화돼요.</div>
    <div class="modal-btns">
      <button class="btn" style="background:#1e1a00;color:var(--yellow);border:1px solid #3a3010" id="resetConfirm">초기화</button>
      <button class="btn btn-secondary" id="resetCancel">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let sets = JSON.parse(localStorage.getItem('vocab_sets') || '[]');
let activeSetId = localStorage.getItem('vocab_active') || null;

function save() {
  localStorage.setItem('vocab_sets', JSON.stringify(sets));
  localStorage.setItem('vocab_active', activeSetId || '');
}
function getSet(id) { return sets.find(s => s.id === id); }

function toast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function fmtDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── HOME ──
function renderHome() {
  const container = document.getElementById('setList');
  if (!sets.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">아직 불러온 파일이 없어요.<br>위에서 엑셀 파일을 추가해보세요!</div></div>`;
    return;
  }
  container.innerHTML = '';
  [...sets].reverse().forEach(set => {
    const total = set.words.length;
    const known = Object.values(set.progress).filter(v=>v==='known').length;
    const unknown = Object.values(set.progress).filter(v=>v==='unknown').length;
    const neww = total - known - unknown;
    const pct = total > 0 ? known/total*100 : 0;
    const isActive = set.id === activeSetId;

    const card = document.createElement('div');
    card.className = 'set-card' + (isActive ? ' active-set' : '');
    card.innerHTML = `
      <div class="set-name">📄 ${set.filename}</div>
      <div class="set-meta">📅 ${fmtDate(set.importedAt)} 불러옴</div>
      <div class="set-stats">
        <span class="set-stat total">전체 ${total}</span>
        <span class="set-stat known">✓ ${known}</span>
        <span class="set-stat unknown">✗ ${unknown}</span>
        <span class="set-stat neww">미학습 ${neww}</span>
      </div>
      <div class="set-progress"><div class="set-progress-fill" style="width:${pct}%"></div></div>
      <div class="set-actions">
        <button class="btn btn-secondary" data-action="list"  data-id="${set.id}">📋 단어 보기</button>
        <button class="btn btn-primary"   data-action="study" data-id="${set.id}">${isActive?'▶ 이어서 학습':'▶ 학습하기'}</button>
      </div>
      <div class="set-sub-actions">
        <button class="btn btn-secondary" style="color:var(--yellow);border-color:#3a3010;background:#1e1a00" data-action="reset"  data-id="${set.id}">↺ 기록 초기화</button>
        <button class="btn btn-danger"                                                                         data-action="delete" data-id="${set.id}">🗑 삭제</button>
      </div>
    `;
    container.appendChild(card);
  });

  container.onclick = e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    if (action==='study')  startStudy(id);
    if (action==='list')   openWordList(id);
    if (action==='delete') openModal('delModal', id);
    if (action==='reset')  openModal('resetModal', id);
  };
}

// ── UPLOAD ──
document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('uploadZone').ondragover = e => { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag'); };
document.getElementById('uploadZone').ondragleave = () => document.getElementById('uploadZone').classList.remove('drag');
document.getElementById('uploadZone').ondrop = e => {
  e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
};
document.getElementById('fileInput').onchange = e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
  e.target.value = '';
};

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1 });
      const words = [];
      for (let i=1; i<rows.length; i++) {
        const r = rows[i];
        const w = (r[0]||'').toString().trim();
        if (!w) continue;
        words.push({ word:w, meaning:(r[1]||'').toString().trim(), example:(r[2]||'').toString().trim(), pronunciation:(r[3]||'').toString().trim() });
      }
      if (!words.length) { toast('❌ 단어를 찾을 수 없어요'); return; }
      const newSet = { id: Date.now().toString(), filename: file.name, importedAt: new Date().toISOString(), words, progress:{} };
      sets.push(newSet);
      activeSetId = newSet.id;
      save(); renderHome();
      toast(`✅ "${file.name}" — ${words.length}개 단어 저장됨!`);
    } catch(err) { toast('❌ 파일을 읽을 수 없어요'); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

// ── WORD LIST ──
let wlSetId = null, wlFilter = 'all';

function openWordList(id) {
  wlSetId = id; wlFilter = 'all';
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter==='all'));
  const set = getSet(id);
  document.getElementById('wlTitle').textContent = set.filename.replace(/\.[^.]+$/,'');
  document.getElementById('wlDate').textContent = fmtDate(set.importedAt) + ' 불러옴';
  renderWordList(); go('wordlist');
}

function renderWordList() {
  const set = getSet(wlSetId);
  const body = document.getElementById('wordListBody');
  const items = set.words.map((w,i) => ({...w,i})).filter(w => {
    const s = set.progress[w.i];
    if (wlFilter==='known')   return s==='known';
    if (wlFilter==='unknown') return s==='unknown';
    if (wlFilter==='new')     return !s;
    return true;
  });
  if (!items.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">해당하는 단어가 없어요.</div></div>`;
    return;
  }
  body.innerHTML = items.map(w => {
    const s = set.progress[w.i];
    const badge = s==='known' ? '<span class="word-badge badge-known">✓ 알아요</span>'
                : s==='unknown' ? '<span class="word-badge badge-unknown">✗ 몰라요</span>'
                : '<span class="word-badge badge-new">미학습</span>';
    return `<div class="word-row">
      <div class="word-num">${w.i+1}</div>
      <div class="word-info">
        <div class="word-main">${w.word}</div>
        ${w.pronunciation?`<div class="word-pron">${w.pronunciation}</div>`:''}
        <div class="word-meaning">${w.meaning}</div>
        ${w.example?`<div class="word-example">"${w.example}"</div>`:''}
      </div>
      ${badge}
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.onclick = () => {
    wlFilter = tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t===tab));
    renderWordList();
  };
});
document.getElementById('wlBack').onclick = () => { go('home'); renderHome(); };

// ── STUDY ──
let studySetId=null, queue=[], qIdx=0, isFlipped=false, studyMode='all', sesKnown=0, sesUnknown=0, swipeDX=0;

function startStudy(id) {
  studySetId = id; activeSetId = id; save();
  studyMode = 'all';
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.toggle('active', p.dataset.mode==='all'));
  buildQueue();
  if (!queue.length) { toast('해당하는 단어가 없어요!'); return; }
  sesKnown = sesUnknown = qIdx = 0;
  const set = getSet(id);
  document.getElementById('studySetName').textContent = set.filename.replace(/\.[^.]+$/,'');
  go('study'); renderCard();
}

function buildQueue() {
  const set = getSet(studySetId);
  queue = set.words.map((_,i)=>i).filter(i => {
    const s = set.progress[i];
    if (studyMode==='unknown') return s==='unknown'||!s;
    if (studyMode==='known')   return s==='known';
    return true;
  });
  for (let i=queue.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [queue[i],queue[j]]=[queue[j],queue[i]]; }
}

document.querySelectorAll('.mode-pill').forEach(p => {
  p.onclick = () => {
    studyMode = p.dataset.mode;
    document.querySelectorAll('.mode-pill').forEach(x => x.classList.toggle('active', x===p));
    buildQueue();
    if (!queue.length) { toast('해당하는 단어가 없어요!'); return; }
    sesKnown = sesUnknown = qIdx = 0; renderCard();
  };
});

function renderCard() {
  const set = getSet(studySetId);
  const w = set.words[queue[qIdx]];
  document.getElementById('cardCur').textContent = qIdx+1;
  document.getElementById('cardTot').textContent = queue.length;
  document.getElementById('studyProg').style.width = (qIdx/queue.length*100)+'%';
  document.getElementById('cWord').textContent = w.word;
  document.getElementById('cPron').textContent = w.pronunciation || '';
  document.getElementById('cMeaning').textContent = w.meaning || '';
  let exHtml = '';
  if (w.example) {
    const esc = w.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    exHtml = w.example.replace(new RegExp(esc,'gi'), m=>`<em>${m}</em>`);
  }
  document.getElementById('cExample').innerHTML = exHtml ? `"${exHtml}"` : '';
  isFlipped=false; swipeDX=0;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped','fly-right','fly-left');
  fc.style.transform=''; fc.style.transition='';
  document.querySelectorAll('.card-overlay').forEach(el=>el.style.opacity=0);
}

function flipCard() { isFlipped=!isFlipped; document.getElementById('flashcard').classList.toggle('flipped',isFlipped); }

function markCard(status) {
  const set = getSet(studySetId);
  set.progress[queue[qIdx]] = status; save();
  if (status==='known') sesKnown++; else sesUnknown++;
  const fc = document.getElementById('flashcard');
  fc.classList.add(status==='known'?'fly-right':'fly-left');
  setTimeout(()=>{ qIdx++; if(qIdx>=queue.length) showResult(); else renderCard(); }, 320);
}

function skipCard() { qIdx++; if(qIdx>=queue.length) showResult(); else renderCard(); }

document.getElementById('btnFlip').onclick = flipCard;
document.getElementById('btnYes').onclick  = ()=>markCard('known');
document.getElementById('btnNo').onclick   = ()=>markCard('unknown');
document.getElementById('btnSkip').onclick = skipCard;
document.getElementById('studyBack').onclick = ()=>{ renderHome(); go('home'); };

document.getElementById('flashcard').onclick = e => { if(Math.abs(swipeDX)<8) flipCard(); };

// Swipe
const fcEl = document.getElementById('flashcard');
let tx=0, ty=0;
fcEl.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; swipeDX=0; },{passive:true});
fcEl.addEventListener('touchmove', e=>{
  swipeDX=e.touches[0].clientX-tx;
  const dy=e.touches[0].clientY-ty;
  if(Math.abs(swipeDX)>Math.abs(dy)&&Math.abs(swipeDX)>8) e.preventDefault();
  const r=Math.min(Math.abs(swipeDX)/110,1);
  if(swipeDX>0){['or1','or2'].forEach(id=>document.getElementById(id).style.opacity=r);['ol1','ol2'].forEach(id=>document.getElementById(id).style.opacity=0);}
  else{['ol1','ol2'].forEach(id=>document.getElementById(id).style.opacity=r);['or1','or2'].forEach(id=>document.getElementById(id).style.opacity=0);}
  document.querySelector('.hint-right').style.opacity=swipeDX>0?r:0;
  document.querySelector('.hint-left').style.opacity=swipeDX<0?r:0;
  fcEl.style.transition='none';
  fcEl.style.transform=isFlipped?`rotateY(180deg) translateX(${-swipeDX}px) rotate(${swipeDX*.05}deg)`:`translateX(${swipeDX}px) rotate(${swipeDX*.05}deg)`;
},{passive:false});
fcEl.addEventListener('touchend',()=>{
  fcEl.style.transition=''; fcEl.style.transform='';
  document.querySelector('.hint-right').style.opacity=0;
  document.querySelector('.hint-left').style.opacity=0;
  if(swipeDX>80) markCard('known');
  else if(swipeDX<-80) markCard('unknown');
  else{ document.querySelectorAll('.card-overlay').forEach(el=>el.style.opacity=0); if(isFlipped) fcEl.style.transform='rotateY(180deg)'; }
});

// ── RESULT ──
function showResult() {
  const pct=queue.length?sesKnown/queue.length:0;
  document.getElementById('resEmoji').textContent=pct>=.8?'🏆':pct>=.5?'👍':'💪';
  document.getElementById('resTitle').textContent=pct>=.8?'완벽해요!':pct>=.5?'잘 하고 있어요!':'조금 더 연습해봐요!';
  document.getElementById('resKnown').textContent=sesKnown;
  document.getElementById('resUnknown').textContent=sesUnknown;
  go('result');
}
document.getElementById('resAgain').onclick=()=>{ buildQueue(); if(!queue.length){toast('단어가 없어요!');return;} sesKnown=sesUnknown=qIdx=0; go('study'); renderCard(); };
document.getElementById('resHome').onclick=()=>{ renderHome(); go('home'); };

// ── MODALS ──
let modalTargetId=null;
function openModal(modalId, id) { modalTargetId=id; document.getElementById(modalId).classList.add('show'); }

document.getElementById('delConfirm').onclick=()=>{
  sets=sets.filter(s=>s.id!==modalTargetId);
  if(activeSetId===modalTargetId) activeSetId=sets.length?sets[sets.length-1].id:null;
  save(); renderHome(); document.getElementById('delModal').classList.remove('show'); toast('🗑 삭제됐어요.');
};
document.getElementById('delCancel').onclick=()=>document.getElementById('delModal').classList.remove('show');

document.getElementById('resetConfirm').onclick=()=>{
  const set=getSet(modalTargetId);
  if(set){set.progress={};save();renderHome();toast('↺ 학습 기록을 초기화했어요.');}
  document.getElementById('resetModal').classList.remove('show');
};
document.getElementById('resetCancel').onclick=()=>document.getElementById('resetModal').classList.remove('show');

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.onclick=e=>{if(e.target===m) m.classList.remove('show');};
});

// INIT
renderHome();
</script>
</body>
</html>
